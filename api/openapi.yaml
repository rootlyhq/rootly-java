        explode: true
        in: query
        name: earliest
        required: false
        schema:
          type: boolean
        style: form
      - description: "Timezone for response times (e.g., America/New_York). Defaults\
          \ to UTC."
        explode: true
        in: query
        name: time_zone
        required: false
        schema:
          type: string
        style: form
      - description: Comma-separated escalation policy IDs
        explode: true
        in: query
        name: "filter[escalation_policy_ids]"
        required: false
        schema:
          type: string
        style: form
      - description: Comma-separated schedule IDs

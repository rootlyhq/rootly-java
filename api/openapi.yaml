          - snoozed
          - triggered
          - open
          - updated
          - added
          - removed
          - marked
          - not_marked
          - muted
          - deferred
          type: string
        source:
          type: string
        user_id:
          description: Author of the note.
          nullable: true
          type: integer
        details:
          description: Note message.
          nullable: true
          type: string
        created_at:
          type: string
        updated_at:
          type: string

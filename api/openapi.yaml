        data:
          $ref: '#/components/schemas/update_alert_data'
      required:
      - data
      type: object
    alert:
      properties:
        short_id:
          description: Human-readable short identifier for the alert
          type: string
        noise:
          description: Whether the alert is marked as noise
          enum:
          - noise
          - not_noise
          nullable: true
          type: string
        source:
          description: The source of the alert
          enum:
          - rootly
          - manual
          - api
          - heartbeat
          - web
          - slack
          - email
          - workflow
          - live_call_routing
          - mobile
          - pagerduty
          - opsgenie
          - victorops
          - pagertree
          - datadog
          - dynatrace
          - nobl9
          - zendesk
          - asana
          - clickup
          - sentry
          - rollbar
          - jira
          - honeycomb
          - service_now
          - linear
          - grafana
          - alertmanager
          - google_cloud
          - generic_webhook
          - cloud_watch
          - aws_sns
          - azure
          - splunk
          - chronosphere
          - app_optics
          - bug_snag
          - monte_carlo
          - nagios
          - prtg
          - catchpoint
          - app_dynamics
          - checkly
          - new_relic
          - gitlab
          type: string
        status:
          description: The status of the alert
          enum:
          - open
          - triggered
          - acknowledged
          - resolved
          - deferred
          type: string
        summary:
          description: The summary of the alert
          type: string
        description:
          description: The description of the alert
          nullable: true
          type: string
        services:
          description: Services attached to the alert
          items:
            allOf:
            - $ref: '#/components/schemas/service'
            type: object
          type: array
        groups:
          description: Groups attached to the alert
          items:
            allOf:
            - $ref: '#/components/schemas/team'
            type: object
          type: array
        environments:
          description: Environments attached to the alert
          items:
            allOf:
            - $ref: '#/components/schemas/environment'
            type: object
          type: array
        service_ids:
          description: The Service IDs to attach to the alert. If your organization
            has On-Call enabled and your notification target is a Service. This field
            will be automatically set for you.
          items:
            type: string
          nullable: true
          type: array
        group_ids:
          description: The Group IDs to attach to the alert. If your organization
            has On-Call enabled and your notification target is a Group. This field
            will be automatically set for you.
          items:
            type: string
          nullable: true
          type: array
        environment_ids:
          description: The Environment IDs to attach to the alert
          items:
            type: string
          nullable: true
          type: array
        external_id:
          description: External ID
          nullable: true
          type: string
        external_url:
          description: External Url
          nullable: true
          type: string
        alert_urgency_id:
          description: The ID of the alert urgency
          nullable: true
          type: string
        group_leader_alert_id:
          description: The ID of the group leader alert
          nullable: true
          type: string
        is_group_leader_alert:
          description: Whether the alert is a group leader alert
          nullable: true
          type: boolean
        labels:
          items:
            $ref: '#/components/schemas/new_alert_data_attributes_labels_inner'
          type: array
        data:
          description: Additional data
          nullable: true
          type: object
        deduplication_key:
          description: Alerts sharing the same deduplication key are treated as a
            single alert.
          nullable: true
          type: string
        alert_field_values_attributes:
          description: Custom alert field values to create with the alert
          items:
            $ref: '#/components/schemas/new_alert_data_attributes_alert_field_values_attributes_inner'
          type: array
        started_at:
          description: When the alert started
          format: date-time
          nullable: true
          type: string
        ended_at:
          description: When the alert ended
          format: date-time
          nullable: true
          type: string
        created_at:
          description: Date of creation
          type: string
        updated_at:
          description: Date of last update
          type: string
